components:
  schemas:
    GroupAdminRepresentation:
      type: object
      properties:
        user:
          type: object
        direct:
          type: boolean
    GroupAupRepresentation:
      type: object
      properties:
        type:
          type: object
        mimeType:
          type: string
        content: {}
        url:
          type: string
    GroupEnrollmentConfigurationRepresentation:
      type: object
      properties:
        id:
          type: string
        group:
          type: object
        name:
          type: string
        active:
          type: boolean
        requireApprovalForExtension:
          type: boolean
        requireApproval:
          type: boolean
        validFrom:
          format: date
          type: string
          example: 2022-03-10
        membershipExpirationDays:
          format: int64
          type: integer
        aup:
          $ref: '#/components/schemas/GroupAupRepresentation'
        enrollmentIntroduction:
          type: string
        invitationIntroduction:
          type: string
        enrollmentConclusion:
          type: string
        invitationConclusion:
          type: string
        visibleToNotMembers:
          type: boolean
        multiselectRole:
          type: boolean
        groupRoles:
          uniqueItems: true
          type: array
          items:
            type: string
        commentsNeeded:
          type: boolean
        commentsLabel:
          type: string
        commentsDescription:
          type: string
    GroupEnrollmentConfigurationRulesRepresentation:
      type: object
      properties:
        id:
          type: string
        field:
          type: string
        type:
          type: object
        defaultValue:
          type: string
        max:
          type: string
        required:
          type: boolean
    GroupEnrollmentRequestPager:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/GroupEnrollmentRequestRepresentation'
        count:
          format: int64
          type: integer
    GroupEnrollmentRequestRepresentation:
      type: object
      properties:
        id:
          type: string
        user:
          type: object
        checkAdmin:
          type: object
        groupEnrollmentConfiguration:
          $ref: '#/components/schemas/GroupEnrollmentConfigurationRepresentation'
        status:
          type: object
        comments:
          type: string
        adminJustification:
          type: string
        reviewComments:
          type: string
        userFirstName:
          type: string
        userLastName:
          type: string
        userEmail:
          type: string
        userIdentifier:
          type: string
        userAssurance:
          uniqueItems: true
          type: array
          items:
            type: string
        userAuthnAuthorities:
          type: string
        groupRoles:
          uniqueItems: true
          type: array
          items:
            type: string
        submittedDate:
          format: date-time
          type: string
          example: 2022-03-10T12:15:50
        approvedDate:
          format: date-time
          type: string
          example: 2022-03-10T12:15:50
    GroupInvitationInitialRepresentation:
      type: object
      properties:
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        withoutAcceptance:
          type: boolean
        groupEnrollmentConfiguration:
          $ref: '#/components/schemas/GroupEnrollmentConfigurationRepresentation'
        groupRoles:
          uniqueItems: true
          type: array
          items:
            type: string
    GroupInvitationRepresentation:
      type: object
      properties:
        id:
          type: string
        creationDate:
          format: date-time
          type: string
          example: 2022-03-10T12:15:50
        forMember:
          type: boolean
        checkAdmin:
          type: object
        groupEnrollmentConfiguration:
          $ref: '#/components/schemas/GroupEnrollmentConfigurationRepresentation'
        group:
          type: object
        groupRoles:
          type: array
